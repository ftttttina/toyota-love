<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step 2: 3D Layer Test - Fatina</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        /* 相機在底層 */
        #webcam { position: absolute; width: 100vw; height: 100vh; object-fit: cover; z-index: 1; }
        /* 3D 容器在頂層 */
        #three_container { position: absolute; width: 100vw; height: 100vh; z-index: 10; pointer-events: none; }
        
        #status { 
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%); 
            background: rgba(255,255,255,0.9); padding: 10px 20px; border-radius: 20px; 
            z-index: 100; font-weight: bold; color: green;
        }
    </style>
</head>
<body>
    <div id="status">Step 2: 3D Engine Loading...</div>
    <video id="webcam" autoplay playsinline></video>
    <div id="three_container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.153.0/three.min.js"></script>

    <script>
        const status = document.getElementById("status");
        const video = document.getElementById("webcam");

        // --- 1. 相機啟動 (延續 Step 1 的成功代碼) ---
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                video.srcObject = stream;
                initThreeJS(); // 相機成功後啟動 3D
            } catch (err) {
                status.innerText = "Camera Error: " + err.name;
                status.style.color = "red";
            }
        }

        // --- 2. Three.js 渲染邏輯 ---
        function initThreeJS() {
            const scene = new THREE.Scene();
            const camera3D = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true }); // alpha: true 才能透視看到相機
            
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('three_container').appendChild(renderer.domElement);

            // 創建一個紅色測試小方塊
            const geometry = new THREE.BoxGeometry(1, 1, 1);
            const material = new THREE.MeshBasicMaterial({ color: 0xff0000 });
            const cube = new THREE.Mesh(geometry, material);
            scene.add(cube);

            camera3D.position.z = 5;

            function animate() {
                requestAnimationFrame(animate);
                // 讓方塊旋轉，證明 3D 引擎正在跑
                cube.rotation.x += 0.02;
                cube.rotation.y += 0.02;
                renderer.render(scene, camera3D);
            }
            
            animate();
            status.innerText = "Step 2 Success: 3D Box Active!";
        }

        window.addEventListener('load', startCamera);

        // 處理螢幕旋轉/縮放
        window.addEventListener('resize', () => {
            // 這裡可以加入重置 renderer 大小的邏輯，我們先保持簡單
        });
    </script>
</body>
</html>
