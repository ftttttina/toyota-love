<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toyota AR - For Leo</title>
    <style>
        /* 基礎設置 */
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Arial, sans-serif; }
        #webcam { position: absolute; width: 100vw; height: 100vh; object-fit: cover; z-index: 1; }
        #three_container { position: absolute; width: 100vw; height: 100vh; z-index: 3; pointer-events: none; }

        /* 白色簡約 UI 面板 */
        .info-panel {
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%);
            z-index: 10; 
            width: 85%; 
            max-width: 320px;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 24px; 
            padding: 35px 20px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            color: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: opacity 0.4s ease;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .title { font-size: 20px; font-weight: 700; margin-bottom: 12px; line-height: 1.3; }
        .subtitle { font-size: 15px; margin-bottom: 25px; line-height: 1.6; color: #444; }
        
        /* Fatina 名字加粗加重 */
        .bold-name { font-weight: 900; color: #000; text-decoration: underline; }

        /* 啟動按鈕 */
        #start-btn {
            background: #000; 
            color: #fff; 
            border: none;
            padding: 15px 45px; 
            border-radius: 40px;
            font-weight: 700; 
            cursor: pointer; 
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.2s;
        }
        #start-btn:active { transform: scale(0.95); }

        /* 底部狀態提示 */
        #log { font-size: 11px; margin-top: 20px; color: #999; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>
    <video id="webcam" autoplay playsinline></video>
    
    <div id="three_container"></div>

    <div class="info-panel" id="gui-panel">
        <div class="title">Hi Leo, this is the Toyota Car</div>
        <div class="subtitle">Open your hand with camera<br>Love aunty <span class="bold-name">Fatina</span></div>
        <button id="start-btn">Start Experience</button>
        <div id="log">System Initializing...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.153.0/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.153.0/examples/js/loaders/GLTFLoader.js"></script>

    <script type="module">
        import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        const logElement = document.getElementById("log");
        const startBtn = document.getElementById("start-btn");
        const guiPanel = document.getElementById("gui-panel");
        const video = document.getElementById("webcam");
        
        let handLandmarker;
        let lastVideoTime = -1;
        let carModel;
        let isStarted = false;

        // --- 1. Three.js 初始化 ---
        const scene = new THREE.Scene();
        const camera3D = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('three_container').appendChild(renderer.domElement);

        // 加強光照（讓車子亮起來）
        scene.add(new THREE.AmbientLight(0xffffff, 2.5)); 
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);

        camera3D.position.z = 5;

        // --- 2. 加載 Toyota 模型 ---
        const loader = new THREE.GLTFLoader();
        // 使用相對路徑引導瀏覽器尋找同目錄下的 car.glb
        loader.load('./car.glb', (gltf) => {
            carModel = gltf.scene;
            carModel.scale.set(0.4, 0.4, 0.4); 
            carModel.visible = false;
            scene.add(carModel);
            logElement.innerText = "Toyota Ready!";
        }, undefined, (err) => {
            logElement.innerText = "Error: Check car.glb file";
            console.error(err);
        });

        // --- 3. 啟動按鈕點擊事件 ---
        startBtn.addEventListener('click', async () => {
            logElement.innerText = "Launching AI...";
            startBtn.style.visibility = "hidden"; // 點擊後按鈕消失

            try {
                // 加載 Mediapipe
                const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
                handLandmarker = await HandLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`,
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO", numHands: 1
                });
                
                // 請求開啟後置攝像頭
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
                
                video.addEventListener("loadeddata", () => {
                    isStarted = true;
                    logElement.innerText = "AI Tracking Active";
                    animate(); // 開始渲染循環
                });
            } catch (err) {
                alert("Camera Access Denied: " + err.message);
                logElement.innerText = "Camera Error";
                startBtn.style.visibility = "visible";
            }
        });

        // --- 4. 渲染循環與手部追蹤 ---
        function animate() {
            if (isStarted && video.currentTime !== lastVideoTime) {
                lastVideoTime = video.currentTime;
                
                // 執行 AI 手部偵測
                const results = handLandmarker.detectForVideo(video, performance.now());

                if (results.landmarks && results.landmarks.length > 0 && carModel) {
                    const palm = results.landmarks[0][9]; // 中指根部為中心點
                    
                    // 將手部坐標映射到 3D 空間
                    carModel.position.x = (palm.x - 0.5) * 8;
                    carModel.position.y = -(palm.y - 0.5) * 12;
                    carModel.position.z = -palm.z * 10;
                    
                    carModel.rotation.y += 0.04; // 自動旋轉小車
                    carModel.visible = true;
                    
                    // 隱藏 UI 面板，顯示全螢幕 AR
                    guiPanel.style.opacity = "0";
                    guiPanel.style.pointerEvents = "none";
                } else if (carModel) {
                    carModel.visible = false;
                    // 手拿開時，重新顯示提示面板
                    guiPanel.style.opacity = "1";
                    guiPanel.style.pointerEvents = "auto";
                    logElement.innerText = "Scan your hand...";
                }
            }
            
            renderer.render(scene, camera3D);
            requestAnimationFrame(animate);
        }

        // 窗口大小適應
        window.addEventListener('resize', () => {
            camera3D.aspect = window.innerWidth / window.innerHeight;
            camera3D.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
