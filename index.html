<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toyota AR - For Leo</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: -apple-system, sans-serif; }
        #webcam { position: absolute; width: 100vw; height: 100vh; object-fit: cover; z-index: 1; }
        #three_container { position: absolute; width: 100vw; height: 100vh; z-index: 10; pointer-events: none; }
        
        /* 提示面板 */
        #status { 
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%); 
            background: rgba(255,255,255,0.95); padding: 12px 25px; border-radius: 30px; 
            z-index: 100; font-weight: bold; font-size: 14px; color: #333;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); text-align: center;
            min-width: 200px;
        }
        .bold-name { font-weight: 900; color: #000; text-decoration: underline; }
    </style>
</head>
<body>
    <div id="status">Connecting to Toyota...</div>
    
    <video id="webcam" autoplay playsinline></video>
    <div id="three_container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.153.0/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.153.0/examples/js/loaders/GLTFLoader.js"></script>

    <script type="module">
        import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        const status = document.getElementById("status");
        const video = document.getElementById("webcam");
        let handLandmarker, carModel, lastVideoTime = -1;
        let scene, camera3D, renderer;

        // 1. 初始化 3D 環境
        function initThreeJS() {
            scene = new THREE.Scene();
            camera3D = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('three_container').appendChild(renderer.domElement);

            // 加強光照
            scene.add(new THREE.AmbientLight(0xffffff, 3.0)); 
            const sun = new THREE.DirectionalLight(0xffffff, 1.5);
            sun.position.set(5, 10, 7);
            scene.add(sun);

            camera3D.position.z = 5;
            loadModel();
        }

        // 2. 加載模型 (含超時備案)
        function loadModel() {
            const loader = new THREE.GLTFLoader();
            // 加上時間戳記防止 GitHub 緩存舊檔案
            const modelUrl = './car.glb?v=' + Date.now();

            // 如果 6 秒內沒加載完，就先用方塊代替，不讓 Leo 等太久
            const timeout = setTimeout(() => {
                if (!carModel) {
                    status.innerText = "Model slow, using Test Cube...";
                    useFallbackCube();
                }
            }, 6000);

            loader.load(modelUrl, (gltf) => {
                clearTimeout(timeout);
                carModel = gltf.scene;
                
                // 自動修正模型大小與位置
                const box = new THREE.Box3().setFromObject(carModel);
                const size = box.getSize(new THREE.Vector3()).length();
                const center = box.getCenter(new THREE.Vector3());
                
                // 強制放縮到適合手掌的大小
                const scaleFactor = 3.5 / size; 
                carModel.scale.set(scaleFactor, scaleFactor, scaleFactor);
                
                // 將模型中心移回座標原點
                carModel.position.x += (carModel.position.x - center.x);
                carModel.position.y += (carModel.position.y - center.y);
                carModel.position.z += (carModel.position.z - center.z);

                carModel.visible = false;
                scene.add(carModel);
                
                status.innerHTML = `Hi Leo! Love <span class="bold-name">Fatina</span>`;
                startAI();
            }, 
            (xhr) => {
                if (xhr.lengthComputable) {
                    const percent = Math.round(xhr.loaded / xhr.total * 100);
                    status.innerText = `Loading Toyota: ${percent}%`;
                } else {
                    status.innerText = "Receiving Toyota data...";
                }
            },
            (err) => {
                clearTimeout(timeout);
                console.error(err);
                status.innerText = "Car.glb error, using Cube";
                useFallbackCube();
            });
        }

        // 備用方塊邏輯
        function useFallbackCube() {
            if (carModel) return;
            const geo = new THREE.BoxGeometry(1, 0.6, 2);
            const mat = new THREE.MeshStandardMaterial({ color: 0xff0000, metalness: 0.7 });
            carModel = new THREE.Mesh(geo, mat);
            carModel.visible = false;
            scene.add(carModel);
            startAI();
        }

        // 3. 啟動 AI 手部偵測
        async function startAI() {
            try {
                const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
                handLandmarker = await HandLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`,
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO", numHands: 1
                });
                animate();
            } catch (e) {
                status.innerText = "AI System Error";
            }
        }

        // 啟動相機
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                video.srcObject = stream;
                video.addEventListener("loadeddata", initThreeJS);
            } catch (err) {
                status.innerText = "Camera Denied";
                alert("請在設定中允許瀏覽器存取相機");
            }
        }

        // 4. 動畫循環
        function animate() {
            if (lastVideoTime !== video.currentTime) {
                lastVideoTime = video.currentTime;
                const results = handLandmarker.detectForVideo(video, performance.now());

                if (results.landmarks && results.landmarks.length > 0 && carModel) {
                    const palm = results.landmarks[0][9];
                    // 映射到 3D 空間
                    carModel.position.set((palm.x - 0.5) * 8, -(palm.y - 0.5) * 12, -palm.z * 10);
                    carModel.rotation.y += 0.05;
                    carModel.visible = true;
                } else if (carModel) {
                    carModel.visible = false;
                }
            }
            renderer.render(scene, camera3D);
            window.requestAnimationFrame(animate);
        }

        window.addEventListener('load', startCamera);
    </script>
</body>
</html>
