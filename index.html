<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toyota AR - Hand Tracking V3</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #webcam { position: absolute; width: 100vw; height: 100vh; object-fit: cover; z-index: 1; }
        #output_canvas { position: absolute; width: 100vw; height: 100vh; z-index: 2; pointer-events: none; }
        .console {
            position: fixed; top: 10px; left: 10px; z-index: 10;
            color: #00ff00; background: rgba(0,0,0,0.8);
            padding: 12px; border-radius: 8px; font-size: 11px;
            border: 1px solid #333; pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="console" id="log">System: Initializing...</div>
    <video id="webcam" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3"></script>

    <script type="module">
        import { HandLandmarker, FilesetResolver, DrawingUtils } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        const logElement = document.getElementById("log");
        const video = document.getElementById("webcam");
        const canvasElement = document.getElementById("output_canvas");
        const canvasCtx = canvasElement.getContext("2d");
        
        let handLandmarker = undefined;
        let lastVideoTime = -1;

        function updateLog(msg) {
            logElement.innerText = `Status: ${msg}`;
            console.log(msg);
        }

        // 1. 初始化检测器
        async function createHandLandmarker() {
            updateLog("Loading AI Models...");
            const vision = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
            );
            handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`,
                    delegate: "GPU"
                },
                runningMode: "VIDEO",
                numHands: 1
            });
            updateLog("Models Loaded. Starting Camera...");
            startCamera();
        }

        // 2. 启动摄像头
        function startCamera() {
            const constraints = {
                video: { facingMode: "environment" }
            };
            navigator.mediaDevices.getUserMedia(constraints)
                .then((stream) => {
                    video.srcObject = stream;
                    video.addEventListener("loadeddata", predictWebcam);
                    updateLog("Camera Active. Scan your hand.");
                })
                .catch((err) => {
                    updateLog(`Camera Error: ${err.name}`);
                });
        }

        // 3. 循环预测与绘图
        async function predictWebcam() {
            canvasElement.width = video.videoWidth;
            canvasElement.height = video.videoHeight;

            if (lastVideoTime !== video.currentTime) {
                lastVideoTime = video.currentTime;
                const results = handLandmarker.detectForVideo(video, performance.now());

                canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
                const drawingUtils = new DrawingUtils(canvasCtx);

                if (results.landmarks) {
                    for (const landmarks of results.landmarks) {
                        updateLog("Hand Tracking Active");
                        drawingUtils.drawConnectors(landmarks, HandLandmarker.HAND_CONNECTIONS, { color: "#00FF00", lineWidth: 5 });
                        drawingUtils.drawLandmarks(landmarks, { color: "#FF0000", lineWidth: 2 });
                    }
                }
            }
            window.requestAnimationFrame(predictWebcam);
        }

        createHandLandmarker();
    </script>
</body>
</html>
