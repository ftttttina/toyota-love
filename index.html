<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Mode - Hand Tracking</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #webcam { position: absolute; width: 100vw; height: 100vh; object-fit: cover; z-index: 1; transform: rotateY(180deg); }
        #output_canvas { position: absolute; width: 100vw; height: 100vh; z-index: 2; pointer-events: none; transform: rotateY(180deg); }
        .debug-info {
            position: fixed; top: 10px; left: 10px; z-index: 10;
            background: rgba(255, 255, 255, 0.9); color: #000;
            padding: 15px; border-radius: 10px; font-size: 12px; width: 250px;
        }
        .bold { font-weight: bold; border-bottom: 1px solid #ccc; margin-bottom: 5px; padding-bottom: 5px; }
    </style>
</head>
<body>
    <div class="debug-info">
        <div class="bold">Hi Leo, Debugging System...</div>
        <div>Love aunty <b>Fatina</b></div>
        <hr>
        <div id="status">Status: Initializing AI...</div>
    </div>
    
    <video id="webcam" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3"></script>

    <script type="module">
        import { HandLandmarker, FilesetResolver, DrawingUtils } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        const status = document.getElementById("status");
        const video = document.getElementById("webcam");
        const canvasElement = document.getElementById("output_canvas");
        const canvasCtx = canvasElement.getContext("2d");
        
        let handLandmarker;
        let lastVideoTime = -1;

        async function init() {
            try {
                const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
                handLandmarker = await HandLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`,
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO", numHands: 1
                });
                
                status.innerText = "AI Loaded. Requesting Camera...";
                startCamera();
            } catch (e) {
                status.innerText = "Init Error: " + e.message;
            }
        }

        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } }) // 先試試前置鏡頭比較穩
                .then((stream) => {
                    video.srcObject = stream;
                    video.addEventListener("loadeddata", predictWebcam);
                    status.innerText = "Camera Active. Show your hand!";
                })
                .catch((err) => {
                    status.innerText = "Camera Error: " + err.name;
                });
        }

        async function predictWebcam() {
            canvasElement.width = video.videoWidth;
            canvasElement.height = video.videoHeight;

            if (lastVideoTime !== video.currentTime) {
                lastVideoTime = video.currentTime;
                const results = handLandmarker.detectForVideo(video, performance.now());

                canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
                const drawingUtils = new DrawingUtils(canvasCtx);

                if (results.landmarks && results.landmarks.length > 0) {
                    status.innerText = "Hand Detected! ✅";
                    for (const landmarks of results.landmarks) {
                        drawingUtils.drawConnectors(landmarks, HandLandmarker.HAND_CONNECTIONS, { color: "#00FF00", lineWidth: 5 });
                        drawingUtils.drawLandmarks(landmarks, { color: "#FF0000", lineWidth: 2 });
                    }
                } else {
                    status.innerText = "Searching for hand...";
                }
            }
            window.requestAnimationFrame(predictWebcam);
        }

        init();
    </script>
</body>
</html>
