<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step 1: Camera Test - Fatina</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #webcam { width: 100vw; height: 100vh; object-fit: cover; }
        #status { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(255,255,255,0.8); padding: 10px; border-radius: 5px; font-family: sans-serif; text-align: center; }
    </style>
</head>
<body>
    <div id="status">Hi Leo, Requesting Camera...</div>
    <video id="webcam" autoplay playsinline></video>

    <script>
        const status = document.getElementById("status");
        const video = document.getElementById("webcam");

        async function startCamera() {
            try {
                // 強制請求後置攝像頭 (environment)
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                video.srcObject = stream;
                status.innerText = "Camera Active! (Step 1 Success)";
                status.style.color = "green";
            } catch (err) {
                status.innerText = "ERROR: " + err.name + " - " + err.message;
                status.style.color = "red";
                alert("Please check: 1. Use Safari/Chrome 2. Use HTTPS 3. Allow Camera access in settings.");
            }
        }

        // 頁面加載後自動執行
        window.addEventListener('load', startCamera);
    </script>
</body>
</html>
