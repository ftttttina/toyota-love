<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toyota AR - Leo's Special</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #webcam { position: absolute; width: 100vw; height: 100vh; object-fit: cover; z-index: 1; }
        #three_container { position: absolute; width: 100vw; height: 100vh; z-index: 10; pointer-events: none; }
        #status { 
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%); 
            background: rgba(255,255,255,0.9); padding: 12px 25px; border-radius: 30px; 
            z-index: 100; font-weight: bold; font-size: 14px; text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); min-width: 220px;
        }
    </style>
</head>
<body>
    <div id="status">Fetching Leo's Toyota...</div>
    <video id="webcam" autoplay playsinline></video>
    <div id="three_container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.153.0/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.153.0/examples/js/loaders/GLTFLoader.js"></script>

    <script type="module">
        import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        const status = document.getElementById("status");
        const video = document.getElementById("webcam");
        let handLandmarker, carModel, lastVideoTime = -1;
        let scene, camera3D, renderer;

        function initThreeJS() {
            scene = new THREE.Scene();
            camera3D = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('three_container').appendChild(renderer.domElement);

            // 環境光與強光，確保模型色彩鮮豔
            scene.add(new THREE.AmbientLight(0xffffff, 2.5));
            const sun = new THREE.DirectionalLight(0xffffff, 1.5);
            sun.position.set(5, 10, 7);
            scene.add(sun);

            camera3D.position.z = 5;
            loadPolyModel();
        }

        function loadPolyModel() {
            const loader = new THREE.GLTFLoader();
            // 這是 Poly Pizza 該模型的直連 GLB 網址
            const modelUrl = 'https://poly.pizza/m/ZEFWmOPSgh/model.glb';

            loader.load(modelUrl, (gltf) => {
                carModel = gltf.scene;
                
                // 自動放縮與居中
                const box = new THREE.Box3().setFromObject(carModel);
                const size = box.getSize(new THREE.Vector3()).length();
                const center = box.getCenter(new THREE.Vector3());
                
                // 調整至手掌大小 (約 3.5 單位)
                const scaleFactor = 3.5 / size;
                carModel.scale.set(scaleFactor, scaleFactor, scaleFactor);
                
                // 修正中心偏移
                carModel.position.x += (carModel.position.x - center.x);
                carModel.position.y += (carModel.position.y - center.y);
                carModel.position.z += (carModel.position.z - center.z);

                carModel.visible = false;
                scene.add(carModel);
                
                status.innerText = "Toyota Ready! Show hand Leo!";
                startAI();
            }, 
            (xhr) => {
                if (xhr.lengthComputable) {
                    const percent = Math.round(xhr.loaded / xhr.total * 100);
                    status.innerText = `Downloading Toyota: ${percent}%`;
                }
            },
            (err) => {
                console.error(err);
                status.innerText = "Load Error. Try refreshing!";
            });
        }

        async function startAI() {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
            handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: { 
                    modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`,
                    delegate: "GPU" 
                },
                runningMode: "VIDEO", numHands: 1
            });
            animate();
        }

        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                video.srcObject = stream;
                video.addEventListener("loadeddata", initThreeJS);
            } catch (err) {
                status.innerText = "Camera Denied";
            }
        }

        function animate() {
            if (lastVideoTime !== video.currentTime) {
                lastVideoTime = video.currentTime;
                const results = handLandmarker.detectForVideo(video, performance.now());
                if (results.landmarks && results.landmarks.length > 0 && carModel) {
                    const palm = results.landmarks[0][9]; // 取得中指根部
                    carModel.position.set((palm.x - 0.5) * 8, -(palm.y - 0.5) * 12, -palm.z * 10);
                    carModel.rotation.y += 0.04; // 緩慢旋轉展示
                    carModel.visible = true;
                } else if (carModel) {
                    carModel.visible = false;
                }
            }
            renderer.render(scene, camera3D);
            window.requestAnimationFrame(animate);
        }
        window.addEventListener('load', startCamera);
    </script>
</body>
</html>
