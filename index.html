<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toyota AR - Hand Tracking Fix</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: Arial, sans-serif; }
        #webcam { position: absolute; width: 100vw; height: 100vh; object-fit: cover; z-index: 1; transform: scaleX(1); }
        #output_canvas { position: absolute; width: 100vw; height: 100vh; z-index: 2; pointer-events: none; }
        .info-panel {
            position: fixed; top: 10px; left: 10px; z-index: 10;
            color: #00ff00; background: rgba(0,0,0,0.8);
            padding: 10px; border-radius: 4px; font-size: 12px; max-width: 80%;
        }
    </style>
</head>
<body>
    <div class="info-panel" id="status">System: Loading MediaPipe...</div>
    <video id="webcam" autoplay playsinline></video>
    <canvas id="output_canvas"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424515/hands.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1620248257/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.4.1637441118/camera_utils.js" crossorigin="anonymous"></script>

    <script>
        const videoElement = document.getElementById('webcam');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const statusDiv = document.getElementById('status');

        function updateStatus(msg) {
            statusDiv.innerText = "System: " + msg;
            console.log(msg);
        }

        // 自动适配屏幕比例
        function onResize() {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
        }
        window.addEventListener('resize', onResize);
        onResize();

        function onResults(results) {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                updateStatus("Hand Detected!");
                for (const landmarks of results.multiHandLandmarks) {
                    drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 4});
                    drawLandmarks(canvasCtx, landmarks, {color: '#FF0000', lineWidth: 1, radius: 3});
                }
            } else {
                updateStatus("Searching for hand...");
            }
            canvasCtx.restore();
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424515/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 0, // 降低复杂度以提升手机运行速度
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 640,  // 降低检测分辨率提升识别率
            height: 480
        });

        // 尝试启动摄像头
        camera.start()
            .then(() => updateStatus("Camera active. Show your hand!"))
            .catch(err => updateStatus("Error: " + err));

    </script>
</body>
</html>
