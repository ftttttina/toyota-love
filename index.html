<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toyota AR - For Leo</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #webcam { position: absolute; width: 100vw; height: 100vh; object-fit: cover; z-index: 1; }
        #three_container { position: absolute; width: 100vw; height: 100vh; z-index: 10; pointer-events: none; }
        #status { 
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%); 
            background: rgba(255,255,255,0.9); padding: 10px 20px; border-radius: 20px; 
            z-index: 100; font-weight: bold; font-size: 14px; color: #333;
        }
    </style>
</head>
<body>
    <div id="status">Connecting to Toyota...</div>
    <video id="webcam" autoplay playsinline></video>
    <div id="three_container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.153.0/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.153.0/examples/js/loaders/GLTFLoader.js"></script>

    <script type="module">
        import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        const status = document.getElementById("status");
        const video = document.getElementById("webcam");
        let handLandmarker, carModel, lastVideoTime = -1;
        let scene, camera3D, renderer;

        function initThreeJS() {
            scene = new THREE.Scene();
            camera3D = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('three_container').appendChild(renderer.domElement);
            scene.add(new THREE.AmbientLight(0xffffff, 3.0)); 
            camera3D.position.z = 5;
            loadModel();
        }

        function loadModel() {
            const loader = new THREE.GLTFLoader();
            // 設定超時機制：5秒後如果還沒載入，就先用方塊
            const timeout = setTimeout(() => {
                if (!carModel) {
                    status.innerText = "Model taking too long, using Test Cube...";
                    useFallbackCube();
                }
            }, 5000);

            loader.load('./car.glb', (gltf) => {
                clearTimeout(timeout);
                carModel = gltf.scene;
                // 自動居中並調整大小
                const box = new THREE.Box3().setFromObject(carModel);
                carModel.scale.set(1, 1, 1); 
                carModel.visible = false;
                scene.add(carModel);
                status.innerText = "Toyota Ready! Show Hand";
                startAI();
            }, 
            (xhr) => {
                // 顯示載入進度
                if (xhr.lengthComputable) {
                    const percentComplete = Math.round(xhr.loaded / xhr.total * 100);
                    status.innerText = `Loading Toyota: ${percentComplete}%`;
                }
            },
            (err) => {
                clearTimeout(timeout);
                status.innerText = "Car.glb error, using Cube";
                useFallbackCube();
            });
        }

        function useFallbackCube() {
            const geo = new THREE.BoxGeometry(0.8, 0.5, 1.5);
            const mat = new THREE.MeshStandardMaterial({ color: 0x0077ff, metalness: 0.8, roughness: 0.2 });
            carModel = new THREE.Mesh(geo, mat);
            carModel.visible = false;
            scene.add(carModel);
            startAI();
        }

        async function startAI() {
            try {
                const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
                handLandmarker = await HandLandmarker.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`,
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO", numHands: 1
                });
                animate();
            } catch (e) { status.innerText = "AI Init Error"; }
        }

        async function startCamera() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
            video.srcObject = stream;
            video.addEventListener("loadeddata", initThreeJS);
        }

        function animate() {
            if (lastVideoTime !== video.currentTime) {
                lastVideoTime = video.currentTime;
                const results = handLandmarker.detectForVideo(video, performance.now());
                if (results.landmarks && results.landmarks.length > 0 && carModel) {
                    const palm = results.landmarks[0][9];
                    carModel.position.set((palm.x - 0.5) * 8, -(palm.y - 0.5) * 12, -palm.z * 10);
                    carModel.rotation.y += 0.05;
                    carModel.visible = true;
                    status.innerText = "Hi Leo! 🚗";
                } else if (carModel) {
                    carModel.visible = false;
                }
            }
            renderer.render(scene, camera3D);
            window.requestAnimationFrame(animate);
        }
        window.addEventListener('load', startCamera);
    </script>
</body>
</html>
