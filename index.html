<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toyota Hand AR - Final</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #webcam { position: absolute; width: 100vw; height: 100vh; object-fit: cover; z-index: 1; }
        #three_container { position: absolute; width: 100vw; height: 100vh; z-index: 3; pointer-events: none; }
        .console {
            position: fixed; top: 10px; left: 10px; z-index: 10;
            color: #ffffff; background: rgba(255,0,0,0.6);
            padding: 8px 15px; border-radius: 20px; font-size: 12px; font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="console" id="log">System: Loading Toyota Model...</div>
    <video id="webcam" autoplay playsinline></video>
    <div id="three_container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.153.0/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.153.0/examples/js/loaders/GLTFLoader.js"></script>

    <script type="module">
        import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        const logElement = document.getElementById("log");
        const video = document.getElementById("webcam");
        let handLandmarker;
        let lastVideoTime = -1;
        let carModel; // 用于存放加载的小车

        // --- THREE.JS 场景配置 ---
        const scene = new THREE.Scene();
        const camera3D = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('three_container').appendChild(renderer.domElement);

        // 添加光照（不然车是黑的）
        const light = new THREE.AmbientLight(0xffffff, 1); // 环境光
        scene.add(light);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
        directionalLight.position.set(0, 1, 1).normalize();
        scene.add(directionalLight);

        // --- 加载 Toyota 模型 ---
        const loader = new THREE.GLTFLoader();
        // 请确保你的仓库里有一个 car.glb 文件
        loader.load('car.glb', function (gltf) {
            carModel = gltf.scene;
            carModel.scale.set(0.1, 0.1, 0.1); // 根据模型实际大小调整缩放
            carModel.visible = false;
            scene.add(carModel);
            logElement.innerText = "Status: Toyota Ready!";
        }, undefined, function (error) {
            logElement.innerText = "Error: car.glb not found in GitHub";
            console.error(error);
        });

        camera3D.position.z = 5;

        async function init() {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
            handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`,
                    delegate: "GPU"
                },
                runningMode: "VIDEO", numHands: 1
            });
            startCamera();
        }

        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
                .then((stream) => {
                    video.srcObject = stream;
                    video.addEventListener("loadeddata", predictWebcam);
                });
        }

        async function predictWebcam() {
            if (lastVideoTime !== video.currentTime) {
                lastVideoTime = video.currentTime;
                const results = handLandmarker.detectForVideo(video, performance.now());

                if (results.landmarks && results.landmarks.length > 0 && carModel) {
                    const palm = results.landmarks[9]; // 中指根部点

                    // 映射坐标
                    carModel.position.x = (palm.x - 0.5) * 6;
                    carModel.position.y = -(palm.y - 0.5) * 10;
                    carModel.position.z = -palm.z * 5;

                    carModel.rotation.y += 0.02; // 让车缓慢旋转
                    carModel.visible = true;
                    logElement.style.background = "rgba(0,255,0,0.6)";
                    logElement.innerText = "Toyota Driving on Hand!";
                } else if (carModel) {
                    carModel.visible = false;
                    logElement.style.background = "rgba(255,0,0,0.6)";
                    logElement.innerText = "Searching for Hand...";
                }
            }
            renderer.render(scene, camera3D);
            window.requestAnimationFrame(predictWebcam);
        }

        init();
    </script>
</body>
</html>
